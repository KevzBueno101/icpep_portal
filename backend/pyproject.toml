[tool.ruff]
# Target Python version
target-version = "py311"

# Select all recommended rules
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "SIM"]

# Ignore some noisy rules
ignore = [
    "E501",   # line too long (Django models often have long lines)
    "N802",   # function name should be lowercase (Django view names)
    "N803",   # argument name should be lowercase
    "N806",   # variable in function should be lowercase
    "SIM114", # combine if-expressions
]

# Exclude generated / vendored files
exclude = [
    "*/migrations/*",
    "*/tests/*",
    "__pycache__/*",
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]
"*/settings.py" = ["E402"]
